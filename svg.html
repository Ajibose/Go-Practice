<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SVG practice</title>
</head>
<body>
    <path d="M 20 100 Q 100 20 180 100" stroke="black" fill="none" stroke-width="2" />

    <svg width="200" height="200">
  <!-- face -->
  <circle cx="100" cy="110" r="70" fill="yellow" stroke="black" stroke-width="2" />

  <!-- hat (triangle) -->
  <polygon points="100,20 50,60 150,60" fill="red" stroke="black" stroke-width="2" />

  <!-- eyes -->
  <circle cx="75" cy="95" r="8" fill="black" />
  <circle cx="125" cy="95" r="8" fill="black" />

  <!-- eyebrows (lines) -->
  <line x1="60" y1="80" x2="90" y2="80" stroke="black" stroke-width="3" />
  <line x1="110" y1="80" x2="140" y2="80" stroke="black" stroke-width="3" />

  <!-- mouth (ellipse) -->
  <ellipse cx="100" cy="145" rx="15" ry="15" fill="black" />

  <path d="M 50 50 L 150 50 L 100 150 Z" 
        stroke="black" fill="none" />
</svg>
<svg width="200" height="200" viewBox="0 0 200 200">
  <path d="M 20 100 Q 100 50 180 100" stroke="black" fill="none" stroke-width="2" />

  <circle cx="20" cy="100" r="3" fill="green" />
  <circle cx="180" cy="100" r="3" fill="green" />
  <circle cx="100" cy="20" r="3" fill="red" />
  <text x="105" y="18" font-size="10" fill="red">control (not on curve)</text>
</svg>

<svg width="200" height="200" viewBox="0 0 200 200">
  <path d="M 20 100 C 60 20 140 180 180 100" stroke="black" fill="none" stroke-width="2" />

  <circle cx="20" cy="100" r="3" fill="green" />
  <circle cx="180" cy="100" r="3" fill="green" />

  <circle cx="60" cy="20" r="3" fill="red" />
  <text x="65" y="18" font-size="10" fill="red">control 1</text>

  <circle cx="140" cy="180" r="3" fill="red" />
  <text x="75" y="175" font-size="10" fill="red">control 2</text>
</svg>

<svg width="100" height="100" viewBox="0 0 200 200" style="border:1px solid #ccc">
  <circle cx="100" cy="100" r="50" fill="teal" />
</svg>

<svg width="400" height="400" viewBox="0 0 200 200" style="border:1px solid #ccc">
  <circle cx="100" cy="100" r="50" fill="teal" />
</svg>

<svg width="100" height="100" style="border:1px solid #ccc">
  <circle cx="50" cy="50" r="40" fill="teal" />
</svg>

<svg width="400" height="400" style="border:1px solid #ccc">
  <circle cx="50" cy="50" r="40" fill="teal" />
</svg>
</body>
</html>
