<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
        {{if .}}
        <ul>
            {{range $id, $paste := .}}
            <li>{{$id}}: {{$paste.Body}} -> created at {{$paste.CreatedAt}}</li>
            {{end}}
        </ul>
        {{else}}
            <p>No paste yet</p>
        {{end}}
    
</body>
</html>
